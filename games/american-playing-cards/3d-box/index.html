        @font-face {
            font-family: 'Azonix';
            src: url('../Simon Allmer Assets/Azonix.otf') format('opentype');
        }
        body { margin: 0; padding: 0; overflow: hidden; background: #0a0a0b; color: white; font-family: 'Optima Black', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; cursor: move; }

        h1 { color: #d4af37; letter-spacing: 2px; margin: 0; font-size: 1.5rem; }
        p { color: #ccc; margin: 5px 0; }
        
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.8s ease; flex-direction: column; }
        
        #interaction-prompt {
            position: fixed;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
            pointer-events: none;
            transition: opacity 0.5s ease;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.9rem;
            color: rgba(212, 175, 55, 0.8);
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: translateX(-50%) translateY(0); }
            50% { opacity: 1; transform: translateX(-50%) translateY(-5px); }
        }

        .menu-title {
            font-family: 'Azonix', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 40px;
            color: #fff;
            letter-spacing: 10px;
            text-align: center;
        }
