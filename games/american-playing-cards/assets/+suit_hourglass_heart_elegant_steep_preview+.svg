<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- The Hourglass Heart (Elegant + Steeper Indents Version) -->
  <!-- Designed with the same Tom Ford-esque sweeping curves and tight waist, but with a deeper, steeper plunge at the top and bottom center indents. -->
  <path 
    d="M 50 18 
       C 65 5, 78 12, 78 28 
       C 78 40, 58 35, 58 50 
       C 58 65, 78 60, 78 72 
       C 78 88, 65 95, 50 82 
       C 35 95, 22 88, 22 72 
       C 22 60, 42 65, 42 50 
       C 42 35, 22 40, 22 28 
       C 22 12, 35 5, 50 18 Z" 
    fill="currentColor"/>
</svg>
