<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- The Hourglass Heart (Elegant + Correct Proportions) -->
  <!-- Base: The outer width of the refined version (correct shoulder proportion). 
       Adjustment: Replaced the sharp waist junction with perfectly smooth, 
       flowing vertical tangents to create an elegant, tailored S-curve slimming 
       towards the middle, eliminating any "sharp" corners at the waist. -->
  <path 
    d="M 50 15 
       C 65 5, 92 10, 92 25 
       C 92 40, 65 38, 65 50 
       C 65 62, 92 60, 92 75 
       C 92 90, 65 95, 50 85 
       C 35 95, 8 90, 8 75 
       C 8 60, 35 62, 35 50 
       C 35 38, 8 40, 8 25 
       C 8 10, 35 5, 50 15 Z" 
    fill="currentColor"/>
</svg>
