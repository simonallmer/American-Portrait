<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- The Horseshoe: Double-Ended Stylized Motif -->
  <path 
    d="M 30 10 
       L 30 30 
       C 30 45, 70 45, 70 30 
       L 70 10 
       M 30 90 
       L 30 70 
       C 30 55, 70 55, 70 70 
       L 70 90" 
    stroke="currentColor" 
    stroke-width="12" 
    stroke-linecap="round" 
    fill="none"/>
  <!-- Connecting bridge for symmetry and cohesion -->
  <rect x="44" y="38" width="12" height="24" rx="6" fill="currentColor"/>
</svg>
