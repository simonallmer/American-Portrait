<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- Heart Design Smooth -->
  <!-- Base: The user's composite HeartDesignNotSmooth.svg 
       Adjustment: Replaced the overlapping Top-Thing, Bottom-Thing, and Whole-Thing 
       with a single, mathematically continuous path. 
       This perfectly preserves the rounded top/bottom lobes and the elegant, 
       cinched waist, but completely eliminates the 4 sharp outer seams. -->
  <path 
    d="M 50 18 
       C 60 8, 78 10, 78 25 
       C 78 40, 58 35, 58 50 
       C 58 65, 78 60, 78 75 
       C 78 90, 60 92, 50 82 
       C 40 92, 22 90, 22 75 
       C 22 60, 42 65, 42 50 
       C 42 35, 22 40, 22 25 
       C 22 10, 40 8, 50 18 Z" 
    fill="currentColor"/>
</svg>
