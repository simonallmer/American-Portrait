<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- The Hourglass Heart (Luxury Refined Version) -->
  <!-- Designed with the perfect waist tapering of the balanced version, 
       but with the outer edges pulled in slightly to perfectly match 
       the width of the standard heart profile. -->
  <path 
    d="M 50 15 
       C 62 5, 70 10, 70 25 
       C 70 40, 62 38, 62 50 
       C 62 62, 70 60, 70 75 
       C 70 90, 62 95, 50 85 
       C 38 95, 30 90, 30 75 
       C 30 60, 38 62, 38 50 
       C 38 38, 30 40, 30 25 
       C 30 10, 38 5, 50 15 Z" 
    fill="currentColor"/>
</svg>
