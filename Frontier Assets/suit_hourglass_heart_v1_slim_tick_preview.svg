<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- The Hourglass Heart (V1 Just a Tick Slimmer) -->
  <!-- Base: The exact original first version. 
       Adjustment: Brought the outermost width control points in from 100 to 92.
       Everything else (waist, top, bottom, and thickness) is 100% identical. -->
  <path 
    d="M 50 15 
       C 85 -10, 92 35, 65 50 
       C 92 65, 85 110, 50 85 
       C 15 110, 8 65, 35 50 
       C 8 35, 15 -10, 50 15 Z" 
    fill="currentColor"/>
</svg>
